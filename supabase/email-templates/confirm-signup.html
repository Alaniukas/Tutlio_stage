<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f3f4f6;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f3f4f6;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);padding:32px 24px;text-align:center;">
              <h1 style="color:#ffffff;font-size:22px;margin:0;font-weight:700;">Potwierdź swój adres e-mail</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 24px;">
              <p style="color:#1f2937;font-size:16px;margin:0 0 16px;">Witaj!</p>
              <p style="color:#4b5563;font-size:14px;line-height:1.6;margin:0 0 24px;">
                Dziękujemy za rejestrację w <strong>Tutlio</strong>. Kliknij przycisk poniżej, aby potwierdzić adres e-mail i dokończyć zakładanie konta.
              </p>
              <table role="presentation" cellspacing="0" cellpadding="0" align="center">
                <tr>
                  <td style="border-radius:12px;background:#4f46e5;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 36px;color:#ffffff;font-size:15px;font-weight:700;text-decoration:none;">Potwierdź e-mail</a>
                  </td>
                </tr>
              </table>
              <p style="color:#9ca3af;font-size:12px;line-height:1.5;margin:24px 0 0;">
                Jeśli nie zakładałeś konta, zignoruj tę wiadomość.
              </p>
            </td>
          </tr>
          <tr>
            <td style="background:#f9fafb;padding:20px 24px;text-align:center;border-top:1px solid #f0f0f0;">
              <p style="color:#9ca3af;font-size:12px;margin:0;">Zespół Tutlio · <a href="mailto:info@tutlio.pl" style="color:#4f46e5;text-decoration:none;">info@tutlio.pl</a></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
